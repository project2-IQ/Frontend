<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n-title="profile_title">LocateIQ | الملف الشخصي</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="profile.css">
  <script src="theme.js"></script>
</head>

<body>

  <!-- Background -->
  <div class="bg" aria-hidden="true">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
    <span class="blob b4 orange"></span>
    <span class="blob b5 orange"></span>
    <span class="blob b6"></span>
    <span class="blob b7"></span>
    <span class="blob b8"></span>
    <span class="blob b9"></span>
    <span class="blob b10 orange"></span>
    <span class="blob b11"></span>
    <span class="blob b12 orange"></span>
  </div>

  <!-- Topbar -->
  <header class="topbar">
    <div class="container topbar-inner">

      <a class="brand" href="index.html" aria-label="LocateIQ Home">
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Z" opacity=".7"/>
            <path d="M14.8 9.2 9.2 14.8l2.2-5.6 3.4 0Z" />
            <path d="M9.2 14.8 14.8 9.2l-2.2 5.6-3.4 0Z" opacity=".7"/>
          </svg>
        </span>
        <span class="brand-text">LocateIQ</span>
      </a>

      <nav class="nav-center" aria-label="روابط">
        <a class="nav-link" href="index.html" data-i18n="nav_home">الرئيسية</a>
      </nav>

      <div class="actions">
        <button class="lang-btn" id="langBtn" type="button">
          <span id="langText">English</span>
          <span class="mini-ic" aria-hidden="true">🌐</span>
        </button>
        <button class="theme-btn" id="themeBtn" type="button" aria-label="Theme">
          <span id="themeText" style="display:none;">Dark</span>
          <span class="theme-moon">🌙</span>
        </button>
      </div>

    </div>
  </header>

  <!-- Side menu button -->
  <button class="menu-fab" id="menuFab" type="button" aria-label="Menu">
    ☰
  </button>

  <!-- Side menu -->
  <aside class="side" id="sideMenu" aria-label="Side Menu">
    <div class="side-head">
      <span class="side-title" data-i18n="menu_title">القائمة</span>
      <button class="side-close" id="menuClose" type="button" aria-label="Close">✕</button>
    </div>

    <a class="side-item active" href="profile.html" data-i18n="menu_profile">
      <span class="si-ic" aria-hidden="true">👤</span>
      <span>الملف الشخصي</span>
    </a>

    <a class="side-item" href="dashboard.html" data-i18n="menu_chat">
      <span class="si-ic" aria-hidden="true">💬</span>
      <span>الشات</span>
    </a>

    <a class="side-item" href="past-results.html" data-i18n="menu_past">
      <span class="si-ic" aria-hidden="true">🕘</span>
      <span>النتائج السابقة</span>
    </a>

    <button class="side-item danger" id="logoutBtn" type="button" data-i18n="menu_logout">
      <span class="si-ic" aria-hidden="true">🚪</span>
      <span>تسجيل الخروج</span>
    </button>
  </aside>

  <!-- Overlay -->
  <div class="menu-overlay" id="menuOverlay"></div>

  <!-- Page -->
  <main class="page">
    <div class="container">

      <header class="page-head">
        <h1 class="page-title" data-i18n="profile_title">الملف الشخصي</h1>
        <p class="page-sub" data-i18n="profile_sub">
          إدارة بياناتك الشخصية وإعدادات الحساب
        </p>
      </header>

      <!-- Profile Grid (عمودي) -->
      <div class="profile-grid">

        <!-- 1. الصورة الشخصية -->
        <div class="profile-card avatar-card">
          <div class="avatar-container">
            <div class="avatar-large" id="avatarPreview">
              <img src="default-avatar.png" alt="User Avatar" id="avatarImg">
            </div>
            <div class="avatar-upload">
              <label for="avatarUpload" class="avatar-upload-btn" data-i18n="change_photo">
                <span class="upload-ic">📷</span>
                <span>تغيير الصورة</span>
              </label>
              <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
            </div>
          </div>
        </div>

        <!-- 2. المعلومات الشخصية -->
        <div class="profile-card info-card">
          <h2 class="profile-card-title" data-i18n="personal_info">المعلومات الشخصية</h2>
          
          <div class="info-grid">
            <div class="info-field">
              <label data-i18n="full_name">الاسم الكامل</label>
              <input type="text" id="fullName" value="سارا الشايع" placeholder="الاسم الكامل">
            </div>

            <div class="info-field">
              <label data-i18n="email">البريد الإلكتروني</label>
              <input type="email" id="email" value="sarashaya51@gmail.com" placeholder="البريد الإلكتروني">
            </div>

            <div class="info-field">
              <label data-i18n="phone">رقم الجوال</label>
              <input type="tel" id="phone" value="+966 50 123 4567" placeholder="رقم الجوال">
            </div>

            <div class="info-field">
              <label data-i18n="national_id">رقم الهوية</label>
              <input type="text" id="nationalId" value="1234567890" placeholder="رقم الهوية">
            </div>

            <div class="info-field">
              <label data-i18n="birth_date">تاريخ الميلاد</label>
              <input type="date" id="birthDate" value="2025-01-12">
            </div>

            <div class="info-field">
              <label data-i18n="join_date">تاريخ التسجيل</label>
              <input type="text" id="joinDate" value="Dec 06, 2025" readonly class="readonly">
            </div>
          </div>

          <div class="profile-actions">
            <button class="btn btn-primary" id="saveProfileBtn" data-i18n="save_changes">
              <span>💾</span>
              <span>حفظ التغييرات</span>
            </button>
          </div>
        </div>

        <!-- 3. تغيير كلمة المرور -->
<div class="profile-card password-card">
  <h2 class="profile-card-title" data-i18n="change_password">تغيير كلمة المرور</h2>
  
  <div class="password-fields">
    <div class="info-field">
      <label data-i18n="current_password">كلمة المرور الحالية</label>
      <input type="text" id="currentPassword" placeholder="">
    </div>

    <div class="info-field">
      <label data-i18n="new_password">كلمة المرور الجديدة</label>
      <input type="text" id="newPassword" placeholder="">
    </div>

    <div class="info-field">
      <label data-i18n="confirm_password">تأكيد كلمة المرور</label>
      <input type="text" id="confirmPassword" placeholder="">
    </div>
  </div>

  <div class="profile-actions">
    <button class="btn btn-secondary" id="changePasswordBtn" data-i18n="update_password">
      <span>🔒</span>
      <span>تحديث كلمة المرور</span>
    </button>
  </div>
</div>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="dashboard-footer">
    <div class="container">
      <p>© 2026 <span class="brand-glow">LocateIQ</span> - <span data-i18n="footer_rights">جميع الحقوق محفوظة</span></p>
    </div>
  </footer>

  <script src="profile.js"></script>
</body>
</html>
