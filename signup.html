<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LocateIQ | إنشاء حساب</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="signup.css">
  <script src="theme.js"></script>
</head>

<body>

  <!-- Background blobs -->
  <div class="bg" aria-hidden="true">
    <!-- LEFT (blue) -->
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
    <span class="blob b4"></span>

    <!-- RIGHT (orange) -->
    <span class="blob b5 orange"></span>
    <span class="blob b6 orange"></span>
    <span class="blob b7 orange"></span>
    <span class="blob b8 orange"></span>
  </div>

  <!-- Topbar (مع الشعار) -->
  <header class="topbar">
    <div class="container topbar-inner">
     <a class="brand" href="index.html">
  <span class="brand-icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" width="24" height="24">
      <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Z" opacity=".7" fill="#ff7a18"/>
      <path d="M14.8 9.2 9.2 14.8l2.2-5.6 3.4 0Z" fill="#ff7a18"/>
      <path d="M9.2 14.8 14.8 9.2l-2.2 5.6-3.4 0Z" opacity=".7" fill="#ff7a18"/>
    </svg>
  </span>
  <span class="brand-text" style="color: #ff7a18 !important;">Locate<span class="brand-glow">IQ</span></span>
</a>

      <nav class="nav-center" aria-label="روابط">
        <a class="nav-link" href="index.html" id="homeLink">الرئيسية</a>
      </nav>

      <div class="actions">
        <button class="lang-btn" id="langBtn" type="button">
          <span id="langText">English</span>
          <span class="mini-ic" aria-hidden="true">🌐</span>
        </button>
        <button class="theme-btn" id="themeBtn" type="button" aria-label="Theme">
          <span id="themeText" style="display:none;">Dark</span>
          <span class="theme-moon">🌙</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Sign Up -->
  <main class="login-hero">
    <div class="container login-inner">

      <div class="login-head">
        <h1 class="login-title" id="title">
          <span id="createText">أنشئ حسابك في</span> <span class="brand-glow">LocateIQ</span>
        </h1>
        <p class="login-subtitle" id="subtitle">ابدأ رحلتك نحو استثمار أذكى</p>
      </div>

      <form class="login-card signup-card" id="signupForm" autocomplete="on">

        <label id="nameLabel" for="fullName">الاسم الكامل</label>
        <input id="fullName" type="text" placeholder="أدخل اسمك الكامل" required>

        <label id="emailLabel" for="email">البريد الإلكتروني</label>
        <input id="email" type="email" placeholder="أدخل بريدك الإلكتروني" required>

        <label id="passLabel" for="password">كلمة المرور</label>
        <input
          id="password"
          type="password"
          placeholder="أدخل كلمة المرور"
          required
          minlength="8"
        />

        <p class="password-rules" id="passwordRules">
          يجب أن تحتوي كلمة المرور على: 8 أحرف على الأقل، حرف كبير، حرف صغير، رقم، ورمز.
        </p>

        <label id="confirmLabel" for="confirmPassword">تأكيد كلمة المرور</label>
        <input id="confirmPassword" type="password" placeholder="أعد إدخال كلمة المرور" required>

        <button class="login-btn" type="submit" id="createBtn">إنشاء حساب →</button>

        <p class="login-foot">
          <span id="haveAccount">لديك حساب؟</span>
          <a href="login.html" id="loginLink">سجّل الدخول</a>
        </p>
      </form>

    </div>
  </main>

  <!-- FOOTER (جديد) -->
  <footer class="login-footer">
    <div class="container">
      <p>© 2026 <span class="brand-glow">LocateIQ</span> - <span id="footerRights">جميع الحقوق محفوظة</span></p>
    </div>
  </footer>

  <script src="signup.js"></script>
</body>
</html>
