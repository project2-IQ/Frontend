<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n-title="past_title">LocateIQ | النتائج السابقة</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="past-results.css">
  <script src="theme.js"></script>
</head>

<body>

  <!-- Background (نفس خلفية الهوم) -->
  <div class="bg" aria-hidden="true">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
    <span class="blob b4 orange"></span>
    <span class="blob b5 orange"></span>
    <span class="blob b6"></span>
    <span class="blob b7"></span>
    <span class="blob b8"></span>
    <span class="blob b9"></span>
    <span class="blob b10 orange"></span>
    <span class="blob b11"></span>
    <span class="blob b12 orange"></span>
  </div>

  <!-- Topbar -->
  <header class="topbar">
    <div class="container topbar-inner">

      <a class="brand" href="index.html" aria-label="LocateIQ Home">
        <span class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Z" opacity=".7"/>
            <path d="M14.8 9.2 9.2 14.8l2.2-5.6 3.4 0Z" />
            <path d="M9.2 14.8 14.8 9.2l-2.2 5.6-3.4 0Z" opacity=".7"/>
          </svg>
        </span>
        <span class="brand-text">LocateIQ</span>
      </a>

      <nav class="nav-center" aria-label="روابط">
        <a class="nav-link" href="index.html" data-i18n="nav_home">الرئيسية</a>
      </nav>

      <div class="actions">
        <button class="lang-btn" id="langBtn" type="button">
          <span id="langText">English</span>
          <span class="mini-ic" aria-hidden="true">🌐</span>
        </button>
        <button class="theme-btn" id="themeBtn" type="button" aria-label="Theme">
          <span id="themeText" style="display:none;">Dark</span>
          <span class="theme-moon">🌙</span>
        </button>
      </div>

    </div>
  </header>

  <!-- Side menu button -->
  <button class="menu-fab" id="menuFab" type="button" aria-label="Menu">
    ☰
  </button>

  <!-- Side menu -->
  <aside class="side" id="sideMenu" aria-label="Side Menu">
    <div class="side-head">
      <span class="side-title" data-i18n="menu_title">القائمة</span>
      <button class="side-close" id="menuClose" type="button" aria-label="Close">✕</button>
    </div>

    <a class="side-item" href="profile.html" data-i18n="menu_profile">
      <span class="si-ic" aria-hidden="true">👤</span>
      <span>الملف الشخصي</span>
    </a>

    <a class="side-item" href="dashboard.html" data-i18n="menu_chat">
      <span class="si-ic" aria-hidden="true">💬</span>
      <span>الشات</span>
    </a>

    <a class="side-item active" href="past-results.html" data-i18n="menu_past">
      <span class="si-ic" aria-hidden="true">🕘</span>
      <span>النتائج السابقة</span>
    </a>

    <button class="side-item danger" id="logoutBtn" type="button" data-i18n="menu_logout">
      <span class="si-ic" aria-hidden="true">🚪</span>
      <span>تسجيل الخروج</span>
    </button>
  </aside>

  <!-- Overlay -->
  <div class="menu-overlay" id="menuOverlay"></div>

  <!-- Page -->
  <main class="page">
    <div class="container">

      <header class="page-head">
        <h1 class="page-title" data-i18n="past_title">النتائج السابقة</h1>
        <p class="page-sub" data-i18n="past_sub">
          آخر 10 تحليلات قمت بها
        </p>
      </header>

      <!-- Filters (مؤقتة - غير فعالة) -->
      <div class="filters-bar">
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all" data-i18n="filter_all">الكل</button>
          <button class="filter-btn" data-filter="high" data-i18n="filter_high">مناسب جداً</button>
          <button class="filter-btn" data-filter="medium" data-i18n="filter_medium">مناسب متوسط</button>
          <button class="filter-btn" data-filter="low" data-i18n="filter_low">غير موصى به</button>
        </div>
        <div class="search-box">
          <input type="text" id="searchInput" data-i18n-placeholder="search_placeholder" placeholder="بحث بالاسم...">
          <span class="search-ic">🔍</span>
        </div>
      </div>

      <!-- Results Grid (سيتم ملؤها بـ JS) -->
      <div class="results-grid" id="resultsGrid"></div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="dashboard-footer">
    <div class="container">
      <p>© 2026 <span class="brand-glow">LocateIQ</span> - <span data-i18n="footer_rights">جميع الحقوق محفوظة</span></p>
    </div>
  </footer>

  <script src="past-results.js"></script>
</body>
</html>
